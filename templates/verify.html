<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | ToolTrack</title>
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Optional: Custom CSS -->
    <style>
        body {
            background-color: #f8f9fa;
            background-image: url("{{ url_for('static', filename='images/background2.jpg') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .verify-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .verify-container h2 {
            font-weight: 600;
            margin-bottom: 20px;
        }
        .verify-container p {
            color: #6c757d;
        }
        .btn-primary {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="verify-container">
        <img src="{{ url_for('static', filename='images/yown.jpg') }}" alt="Email Icon" width="80" class="mb-3">
        <h2>Verify Your Email</h2>
        <p>We just sent a verification code to <strong>{{ email }}</strong>.</p>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
        {% endwith %}

    <form method="POST" action="{{ url_for('verify_code') }}">
    <div class="mb-3">
        <input type="text" name="code" class="form-control" placeholder="Enter your verification code" required>
    </div>
    <button type="submit" class="btn btn-primary">Verify Now</button>
</form>

<form method="POST" action="{{ url_for('resend_code') }}" class="mt-2">
    <button type="submit" class="btn btn-link p-0">Didn't receive the email? Resend</button>
</form>

    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
