<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("{{ url_for('static', filename='images/background1.jpg') }}") no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    /* subtle uniform overlay instead of random dark areas */
    background: rgba(0, 0, 0, 0.25);

    z-index: 0;
}


/* CENTER WRAPPER */
.container {
    max-width: 950px;
    margin: 90px auto;
    text-align: center;
    padding: 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* TITLE */
h1 {
    color: #fff;
    font-size: 38px;
    margin-bottom: 5px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

p {
    color: #eee;
    margin-bottom: 40px;
}

/* CARD GRID */
.menu {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* CARD STYLE */
.card {
    width: 220px;
    height: 160px;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-size: 18px;
    transition: 0.3s ease;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* ICON */
.card i {
    font-size: 40px;
    margin-bottom: 10px;
}

/* HOVER EFFECT */
.card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 10px 35px rgba(0,0,0,0.3);
}

/* COLORS per card */
.inventory i { color: #3498db; }
.borrow i { color: #2ecc71; }
.requests i { color: #f39c12; }

</style>
</head>
<header>
    <div class="logo">
        <img src="{{ url_for('static', filename='images/yown.jpg') }}">
        <h1>Borrow System</h1>
    </div>
    
    <a href="/Logout">🚪 Logout</a>
    
</header>
<body>

<div class="container">

    <h1>Welcome, {{ session['fullname'] }} 👋</h1>
    <p>Choose what you want to do today</p>

    <div class="menu">

        <a href="/Costumerinv" class="card inventory">
            <i class="fas fa-box"></i>
            See Inventory
        </a>

        <a href="/borrow" class="card borrow">
            <i class="fas fa-cart-shopping"></i>
            Borrow Equipment
        </a>

        <a href="/Pending" class="card requests">
            <i class="fas fa-envelope"></i>
            Your Requests
        </a>

    </div>

</div>

</body>
</html>
