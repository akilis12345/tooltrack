<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='header.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='sidebar.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: url("{{ url_for('static', filename='images/background1.jpg') }}") no-repeat center center fixed;
    background-size: cover;
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    /* subtle uniform overlay instead of random dark areas */
    background: rgba(0, 0, 0, 0.25);

    z-index: 0;
}


/* MAIN CONTAINER */
.container {
    max-width: 900px;

    margin: 60px auto 0 auto; /* centers horizontally */

    padding: 30px;
    text-align: center;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
/* TITLE */
h1 {
    color: white;
    font-size: 36px;
    margin-bottom: 30px;
}

/* GRID */
.menu {
    display: flex;
    justify-content: center;
    gap: 25px;
    flex-wrap: wrap;
}

/* CARD */
.card {
    width: 230px;
    height: 170px;
    border-radius: 18px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-size: 18px;
    transition: 0.3s;
    position: relative;
}

.card i {
    font-size: 40px;
    margin-bottom: 10px;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    background: rgba(255,255,255,0.25);
}

/* BADGE (for requests) */
.badge {
    position: absolute;
    top: 10px;
    right: 12px;
    background: red;
    color: white;
    font-size: 13px;
    padding: 4px 9px;
    border-radius: 50%;
    font-weight: bold;
}

</style>
</head>
<header>
    <div class="logo">
        <img src="{{ url_for('static', filename='images/yown.jpg') }}">
        <h1>Borrow System</h1>
    </div>
    
    <a href="/Logout">🚪 Logout</a>
    
</header>
<body>

<div class="container">

    <h1>Admin Panel 🛠️</h1>

    <div class="menu">

        <!-- INVENTORY -->
        <a href="/inventoryA" class="card">
            <i class="fas fa-boxes"></i>
            Inventory
        </a>

        <!-- REQUESTS -->
        <a href="/Request" class="card">
            <i class="fas fa-inbox"></i>
            Requests

            {% if request_count > 0 %}
            <div class="badge">{{ request_count }}</div>
            {% endif %}

        </a>

        <!-- MANAGE -->
        <a href="/manage" class="card">
            <i class="fas fa-gear"></i>
            Manage
        </a>

        <!-- HISTORY (optional) -->
        <a href="/History" class="card">
            <i class="fas fa-clock"></i>
            History
        </a>

    </div>

</div>

</body>
</html>
